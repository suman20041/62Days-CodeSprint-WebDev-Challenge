<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOM Manipulation - Form to UI</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; }
    .card { background: #0b1320; border: 1px solid #b3ff5a66; color: #d9fdd0; border-radius: 12px; padding: 14px; }
    label { display: block; margin: 10px 0; }
    input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #b3ff5a33; background: #0f1b2d; color: #d9fdd0; }
    button { margin-top: 10px; padding: 10px 14px; border-radius: 12px; background: #b3ff5a; color: #0b1320; font-weight: 900; border: 0; cursor: pointer; }
  </style>
</head>
<body>
  <h1>DOM: form to UI</h1>

  <div class="card">
    <form id="form">
      <label>
        Product name
        <input name="product" type="text" placeholder="e.g., Desk Lamp" required />
      </label>
      <label>
        Price
        <input name="price" type="number" min="0" step="0.01" placeholder="e.g., 24.99" required />
      </label>
      <button type="submit">Preview</button>
    </form>

    <hr style="border-color:#b3ff5a33" />

    <h2>Preview</h2>
    <p><strong>Name:</strong> <span id="pName">—</span></p>
    <p><strong>Price:</strong> $<span id="pPrice">—</span></p>
  </div>

  <script>
    const form = document.getElementById('form');
    const pName = document.getElementById('pName');
    const pPrice = document.getElementById('pPrice');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const name = fd.get('product');
      const price = Number(fd.get('price'));

      pName.textContent = String(name);
      pPrice.textContent = price.toFixed(2);
    });
  </script>
</body>
</html>
