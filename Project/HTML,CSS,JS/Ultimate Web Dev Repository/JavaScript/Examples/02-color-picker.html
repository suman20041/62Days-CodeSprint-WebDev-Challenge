<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JS Examples - Color Picker</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; background:#0b1320; color:#d9fdd0; }
    .panel { max-width: 720px; margin: 0 auto; padding: 16px; border-radius:18px; border:1px solid #b3ff5a66; background:#0f1b2d; }
    .swatch { height: 120px; border-radius: 16px; border:1px solid #b3ff5a33; margin-top: 14px; }
    input[type="color"] { width: 100%; height: 48px; padding: 0; background: transparent; border: 0; }
    code { background:#b3ff5a22; border:1px solid #b3ff5a66; padding:2px 6px; border-radius:10px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1 style="margin-top:0">Color Picker</h1>
    <p>Pick a color and see the hex value update.</p>

    <label>
      Choose color:
      <input id="picker" type="color" value="#b3ff5a" />
    </label>

    <div class="swatch" id="swatch"></div>

    <p>
      Hex: <code id="hex">#b3ff5a</code>
    </p>
  </div>

  <script>
    const picker = document.getElementById('picker');
    const swatch = document.getElementById('swatch');
    const hex = document.getElementById('hex');

    function update() {
      const value = picker.value;
      swatch.style.background = value;
      hex.textContent = value;
    }

    picker.addEventListener('input', update);
    update();
  </script>
</body>
</html>
