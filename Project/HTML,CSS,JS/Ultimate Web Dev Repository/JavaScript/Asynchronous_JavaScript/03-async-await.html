<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Async JS - async/await</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; }
    pre { background:#0b1320; color:#d9fdd0; padding:12px; border-radius:12px; min-height:160px; }
    button { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Asynchronous JS: async/await</h1>
  <button id="run">Fetch</button>
  <pre id="out"></pre>

  <script>
    const out = document.getElementById('out');

    async function getTodo() {
      const res = await fetch('https://jsonplaceholder.typicode.com/todos/2');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    document.getElementById('run').addEventListener('click', async () => {
      out.textContent = 'Loading...';
      try {
        const todo = await getTodo();
        out.textContent = JSON.stringify(todo, null, 2);
      } catch (e) {
        out.textContent = `Error: ${e.message}`;
      }
    });
  </script>
</body>
</html>
