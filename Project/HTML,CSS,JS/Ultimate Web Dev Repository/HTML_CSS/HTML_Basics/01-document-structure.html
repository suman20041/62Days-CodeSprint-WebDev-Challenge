<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML Basics - Document Structure</title>
</head>
<body>
  <header>
    <h1>Document Structure</h1>
    <p>Basic semantic layout using header/main/footer.</p>
  </header>

  <main>
    <section>
      <h2>What’s inside?</h2>
      <ul>
        <li>Headings: <code>h1</code>, <code>h2</code>, ...</li>
        <li>Paragraphs: <code>p</code></li>
        <li>Lists: <code>ul</code> + <code>li</code></li>
      </ul>
    </section>

    <section>
      <h2>Attributes</h2>
      <p>
        This image uses an <code>alt</code> attribute (accessibility).
      </p>
      <img
        src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='640'%20height='180'%3E%3Crect%20width='100%25'%20height='100%25'%20fill='%230B1320'/%3E%3Ctext%20x='50%25'%20y='50%25'%20fill='%23B3FF5A'%20font-size='20'%20text-anchor='middle'%20dominant-baseline='middle'%3EImage%20placeholder%3C/text%3E%3C/svg%3E"
        alt="Placeholder image"
        width="640"
      />
    </section>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> HTML Basics</small>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
