<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSS Fundamentals - Box Model</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; line-height: 1.4; }

    .box {
      width: 260px;
      height: 120px;
      padding: 18px;
      border: 4px solid #b3ff5a;
      margin: 16px;
      background: #0b1320;
      color: #d9fdd0;
      border-radius: 14px;
      box-sizing: border-box;
      position: relative;
    }

    .box::after {
      content: "content box";
      position: absolute;
      bottom: 10px;
      left: 14px;
      font-size: 12px;
      opacity: 0.8;
    }

    .note { font-size: 14px; color: #333; }
  </style>
</head>
<body>
  <h1>Box Model</h1>
  <p class="note">
    This demo uses <code>width/height</code>, <code>padding</code>, <code>border</code>, and <code>margin</code>.
    Notice <code>box-sizing: border-box;</code>.
  </p>

  <div class="box">
    <h2 style="margin:0 0 8px">The Box</h2>
    <p style="margin:0">Padding + border are included in the declared width/height.</p>
  </div>
</body>
</html>
