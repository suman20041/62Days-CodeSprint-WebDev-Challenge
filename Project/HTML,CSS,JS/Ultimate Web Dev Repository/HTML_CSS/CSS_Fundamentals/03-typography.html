<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSS Fundamentals - Typography</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; }

    h1 { font-size: 32px; letter-spacing: 0.5px; margin-bottom: 8px; }

    .lead {
      font-size: 18px;
      line-height: 1.6;
      color: #223;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #b3ff5a22;
      border: 1px solid #b3ff5a66;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .muted { color: #556; }
  </style>
</head>
<body>
  <h1>Typography</h1>
  <p class="lead">Learn the basics: <span class="code">font-size</span>, <span class="code">line-height</span>, and <span class="code">letter-spacing</span>.</p>
  <p class="muted">Also practice using system fonts for portability.</p>
</body>
</html>
