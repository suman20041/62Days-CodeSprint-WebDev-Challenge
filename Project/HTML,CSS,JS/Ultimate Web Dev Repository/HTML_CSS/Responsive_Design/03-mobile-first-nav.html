<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Design - Mobile-first Nav</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #0b1320;
      border: 1px solid #b3ff5a66;
      border-radius: 12px;
    }

    nav a {
      color: #d9fdd0;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 10px;
      background: #0b1320;
      border: 1px solid #b3ff5a33;
    }

    nav a:hover { border-color: #b3ff5a88; }

    /* On larger screens, align links to the right */
    @media (min-width: 900px) {
      nav { justify-content: space-between; }
      nav .brand { font-weight: 800; }
      nav .links { display: flex; gap: 8px; }
    }

    /* Mobile: stacked-ish feel */
    .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .brand { margin-right: auto; }
  </style>
</head>
<body>
  <h1>Mobile-first Navigation</h1>

  <nav aria-label="Primary">
    <span class="brand">MySite</span>
    <div class="links">
      <a href="#home">Home</a>
      <a href="#docs">Docs</a>
      <a href="#blog">Blog</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <p id="home">Resize window to see how layout changes at 900px.</p>
</body>
</html>
