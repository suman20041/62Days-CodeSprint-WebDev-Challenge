<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian — Country Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #08111f;
    --panel: rgba(18,36,60,0.92);
    --panel-surface: rgba(22,40,68,0.96);
    --grid-line: rgba(88,116,146,0.22);
    --ink: #F1F6FB;
    --ink-dim: #A5B4CA;
    --ink-dimmer: #6E8AA4;
    --gold: #F1C463;
    --gold-soft: rgba(241,196,99,0.18);
    --cyan: #6DD6E3;
    --error: #F4716D;
    --serif: 'Newsreader', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *{
    box-sizing: border-box;
  }
  html, body{
    margin: 0;
    min-height: 100%;
    background: radial-gradient(circle at top left, rgba(109,214,227,0.14), transparent 24%),
                radial-gradient(circle at 90% 10%, rgba(241,196,99,0.12), transparent 18%),
                linear-gradient(180deg, #07111f 0%, #0d1a2d 100%);
    color: var(--ink);
    font-family: var(--sans);
  }

  body{
    background-attachment: fixed;
  }

  .wrap{
    width: min(1120px, calc(100% - 36px));
    margin: 0 auto;
    padding: 42px 0 72px;
  }

  .top-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 34px;
  }
  .brand{
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand .mark{
    font-family: var(--serif);
    font-style: italic;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.03em;
  }
  .brand .tag{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .coord{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dimmer);
    letter-spacing: 0.12em;
  }

  .search-box{
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px 18px;
    box-shadow: 0 24px 52px rgba(0,0,0,0.2);
  }
  .search-box:focus-within{
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(241,196,99,0.16);
  }
  .search-box input{
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
    padding: 12px 0;
  }
  .search-box input::placeholder{
    color: var(--ink-dimmer);
  }
  .search-btn{
    background: linear-gradient(135deg, #f4d07d 0%, #e9bd57 100%);
    color: #101823;
    border: none;
    border-radius: 14px;
    padding: 14px 24px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform .18s ease, opacity .15s ease;
    white-space: nowrap;
  }
  .search-btn:hover{
    transform: translateY(-1px);
  }
  .search-btn:disabled{
    opacity: 0.5;
    cursor: default;
    transform: none;
  }

  .state-panel{
    margin-top: 66px;
    text-align: center;
    color: var(--ink-dim);
  }
  .state-panel.hidden{
    display: none;
  }
  .loading-dial{
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.14);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }
  .state-panel p{
    font-size: 15px;
    margin: 0;
    line-height: 1.6;
  }
  .error-panel .icon{
    font-family: var(--serif);
    font-style: italic;
    font-size: 42px;
    color: var(--error);
    display:block;
    margin-bottom: 10px;
  }
  .error-panel .err-name{
    color: var(--error);
    font-style: italic;
  }

  .welcome-panel{
    margin-top: 72px;
    text-align: center;
    color: var(--ink-dim);
    padding: 36px 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
  }
  .welcome-panel .big{
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    color: #eef5fb;
    margin-bottom: 20px;
  }
  .welcome-panel .examples{
    display:flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .welcome-panel .examples span{
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease, transform .15s ease;
    background: rgba(255,255,255,0.03);
  }
  .welcome-panel .examples span:hover{
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-1px);
  }

  .match-list{
    margin-top: 34px;
  }
  .match-list.hidden{
    display:none;
  }
  .match-label{
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dimmer);
    margin-bottom: 12px;
  }
  .match-item{
    display:flex;
    align-items:center;
    gap: 16px;
    padding: 16px 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .match-item:hover{
    border-color: var(--gold);
    transform: translateX(2px);
  }
  .match-item img{
    width: 52px;
    height: 34px;
    object-fit: cover;
    border-radius: 7px;
  }
  .match-item .m-name{
    font-weight: 600;
    font-size: 15px;
  }
  .match-item .m-region{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dimmer);
  }

  #entry{
    margin-top: 42px;
  }
  #entry.hidden{
    display: none;
  }

  .entry-header{
    display:flex;
    gap: 26px;
    align-items: flex-start;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .flag-frame{
    flex-shrink: 0;
    width: 160px;
    min-height: 104px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 8px;
    background: var(--panel);
  }
  .flag-frame img{
    width: 100%;
    display: block;
    border-radius: 10px;
  }
  .headword-block{
    flex: 1;
    min-width: 220px;
  }
  .headword{
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 700;
    line-height: 1.05;
    margin-bottom: 10px;
  }
  .official-name{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-dimmer);
    margin-bottom: 18px;
  }
  .stamp-row{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stamp{
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .fact-grid{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .fact-box{
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 20px 22px;
    min-height: 110px;
  }
  .fact-box .k{
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-dimmer);
    margin-bottom: 10px;
  }
  .fact-box .v{
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
  }
  .fact-box .v.mono{
    font-family: var(--mono);
    font-weight: 500;
  }

  .section{
    margin-bottom: 26px;
  }
  .section-label{
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dimmer);
    margin-bottom: 12px;
  }
  .chip-row{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .info-chip{
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink-dim);
    transition: border-color .15s ease, color .15s ease, transform .15s ease;
  }
  .info-chip:hover{
    border-color: var(--gold);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .border-chip{
    cursor: pointer;
  }
  .border-chip:hover{
    border-color: var(--gold);
    color: var(--gold);
  }
  .empty-note{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-dimmer);
    font-style: italic;
  }

  .source-note{
    margin-top: 36px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dimmer);
  }
  .source-note a{
    color: var(--cyan);
    text-decoration: none;
  }

  @media (max-width: 900px){
    .fact-grid{
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 760px){
    .top-row{
      flex-direction: column;
      align-items: flex-start;
    }
    .search-box{
      grid-template-columns: 1fr;
    }
    .search-btn{
      width: 100%;
    }
  }
  @media (max-width: 640px){
    .headword{
      font-size: 30px;
    }
    .flag-frame{
      width: 100%;
    }
    .fact-grid{
      grid-template-columns: 1fr;
    }
    .entry-header{
      padding-bottom: 20px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-row">
    <div class="brand">
      <span class="mark">Meridian</span>
      <span class="tag">/ country explorer</span>
    </div>
    <span class="coord" id="clock">--° --°</span>
  </div>

  <form class="search-box" id="searchForm">
    <input type="text" id="countryInput" placeholder="Search a country…" autocomplete="off" autofocus>
    <button type="submit" class="search-btn" id="searchBtn">Explore</button>
  </form>

  <div class="state-panel hidden" id="loadingPanel">
    <div class="loading-dial"></div>
    <p>Charting the coordinates…</p>
  </div>

  <div class="state-panel hidden error-panel" id="errorPanel">
    <span class="icon">✕</span>
    <p>No country found matching <span class="err-name" id="errorWord"></span>.</p>
    <p style="margin-top:6px; font-size:13px;">Try a different spelling, or search a region or capital city.</p>
  </div>

  <div class="welcome-panel" id="welcomePanel">
    <div class="big">Somewhere on the map is waiting.</div>
    <div class="examples">
      <span data-country="Japan">Japan</span>
      <span data-country="Brazil">Brazil</span>
      <span data-country="Kenya">Kenya</span>
      <span data-country="Norway">Norway</span>
      <span data-country="India">India</span>
    </div>
  </div>

  <div class="match-list hidden" id="matchList">
    <div class="match-label">Multiple matches — pick one</div>
    <div id="matchItems"></div>
  </div>

  <div id="entry" class="hidden"></div>

</div>

<script>
  const form = document.getElementById('searchForm');
  const input = document.getElementById('countryInput');
  const searchBtn = document.getElementById('searchBtn');
  const loadingPanel = document.getElementById('loadingPanel');
  const errorPanel = document.getElementById('errorPanel');
  const errorWord = document.getElementById('errorWord');
  const welcomePanel = document.getElementById('welcomePanel');
  const matchList = document.getElementById('matchList');
  const matchItems = document.getElementById('matchItems');
  const entryEl = document.getElementById('entry');
  const clock = document.getElementById('clock');

  const COUNTRY_DATA_URL = 'https://raw.githubusercontent.com/mledoze/countries/master/countries.json';
  let countryList = [];

  function setClock(){
    const now = new Date();
    clock.textContent = now.toUTCString().slice(17, 25) + ' UTC';
  }
  setClock();
  setInterval(setClock, 1000);

  document.querySelectorAll('.welcome-panel .examples span').forEach(el => {
    el.addEventListener('click', () => {
      input.value = el.dataset.country;
      form.requestSubmit();
    });
  });

  function showState(state, word){
    welcomePanel.classList.add('hidden');
    matchList.classList.add('hidden');
    loadingPanel.classList.toggle('hidden', state !== 'loading');
    errorPanel.classList.toggle('hidden', state !== 'error');
    entryEl.classList.toggle('hidden', state !== 'result');
    if (state === 'error') errorWord.textContent = `"${word}"`;
    if (state === 'idle') welcomePanel.classList.remove('hidden');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function formatPopulation(num){
    if (typeof num !== 'number') return '—';
    return num.toLocaleString('en-US');
  }

  function formatCurrencies(currencies){
    if (!currencies) return [];
    return Object.values(currencies).map(c => {
      const name = c.name || 'Unknown';
      const symbol = c.symbol ? ` (${c.symbol})` : '';
      return `${name}${symbol}`;
    });
  }

  function formatLanguages(languages){
    if (!languages) return [];
    return Object.values(languages);
  }

  function getFlagUrl(country){
    if (!country.cca2) return '';
    return `https://flagcdn.com/w320/${country.cca2.toLowerCase()}.png`;
  }

  function mapCountryForRender(country){
    return {
      ...country,
      flags: {
        png: getFlagUrl(country),
        svg: getFlagUrl(country),
        alt: `Flag of ${country.name?.common || country.name?.official || country.cca3 || 'country'}`
      }
    };
  }

  async function loadCountryData(){
    try{
      const res = await fetch(COUNTRY_DATA_URL);
      if (!res.ok) throw new Error('Dataset load failed');
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('Invalid country data');
      countryList = data.map(mapCountryForRender);
    } catch(err){
      console.error(err);
      searchBtn.disabled = true;
      errorWord.textContent = 'country data unavailable';
      errorPanel.querySelector('p').textContent = 'Country dataset could not be loaded. Please refresh the page later.';
      showState('error', 'country data unavailable');
    }
  }

  function findBorderNames(codes){
    return codes.map(code => {
      const found = countryList.find(c => c.cca3 === code || c.cca2 === code);
      return { name: found?.name?.common || code, code };
    });
  }

  function renderCountry(country){
    const name = country.name?.common || 'Unknown';
    const officialName = country.name?.official || '';
    const flagUrl = country.flags?.svg || country.flags?.png || '';
    const flagAlt = country.flags?.alt || `Flag of ${name}`;
    const capital = (country.capital && country.capital.length) ? country.capital.join(', ') : 'No capital';
    const region = country.region || '—';
    const subregion = country.subregion || '';
    const population = formatPopulation(country.population);
    const currencies = formatCurrencies(country.currencies);
    const languages = formatLanguages(country.languages);
    const timezones = country.timezones || [];
    const borders = country.borders || [];

    let html = '';

    html += `<div class="entry-header">`;
    html += `<div class="flag-frame">${flagUrl ? `<img src="${flagUrl}" alt="${escapeHtml(flagAlt)}">` : `<div class="empty-note">${escapeHtml(country.flag || '')}</div>`}</div>`;
    html += `<div class="headword-block">`;
    html += `<div class="headword">${escapeHtml(name)}</div>`;
    if (officialName && officialName !== name){
      html += `<div class="official-name">${escapeHtml(officialName)}</div>`;
    }
    html += `<div class="stamp-row">`;
    html += `<span class="stamp">${escapeHtml(region)}</span>`;
    if (subregion) html += `<span class="stamp">${escapeHtml(subregion)}</span>`;
    if (country.cca2) html += `<span class="stamp">${escapeHtml(country.cca2)}</span>`;
    html += `</div></div></div>`;

    html += `<div class="fact-grid">`;
    html += `<div class="fact-box"><div class="k">Capital</div><div class="v">${escapeHtml(capital)}</div></div>`;
    html += `<div class="fact-box"><div class="k">Population</div><div class="v mono">${population}</div></div>`;
    html += `<div class="fact-box"><div class="k">Region</div><div class="v">${escapeHtml(region)}${subregion ? ' · ' + escapeHtml(subregion) : ''}</div></div>`;
    html += `</div>`;

    html += `<div class="section"><div class="section-label">Currencies</div>`;
    html += `<div class="chip-row">`;
    if (currencies.length){
      currencies.forEach(c => { html += `<span class="info-chip">${escapeHtml(c)}</span>`; });
    } else {
      html += `<span class="empty-note">No currency data available</span>`;
    }
    html += `</div></div>`;

    html += `<div class="section"><div class="section-label">Languages</div>`;
    html += `<div class="chip-row">`;
    if (languages.length){
      languages.forEach(l => { html += `<span class="info-chip">${escapeHtml(l)}</span>`; });
    } else {
      html += `<span class="empty-note">No language data available</span>`;
    }
    html += `</div></div>`;

    html += `<div class="section"><div class="section-label">Time zones</div>`;
    html += `<div class="chip-row">`;
    if (timezones.length){
      timezones.forEach(tz => { html += `<span class="info-chip">${escapeHtml(tz)}</span>`; });
    } else {
      html += `<span class="empty-note">No time zone data available</span>`;
    }
    html += `</div></div>`;

    html += `<div class="section" id="bordersSection"><div class="section-label">Bordering countries</div>`;
    html += `<div class="chip-row" id="bordersRow">`;
    if (borders.length){
      html += `<span class="empty-note">Loading borders…</span>`;
    } else {
      html += `<span class="empty-note">No land borders — this country is an island or isolated territory.</span>`;
    }
    html += `</div></div>`;

    html += `<div class="source-note">Data via <a href="https://github.com/mledoze/countries" target="_blank" rel="noopener">mledoze country dataset</a></div>`;

    entryEl.innerHTML = html;
    showState('result');

    if (borders.length){
      const borderCountries = findBorderNames(borders);
      const bordersRow = document.getElementById('bordersRow');
      if (bordersRow){
        bordersRow.innerHTML = '';
        borderCountries.forEach(b => {
          const chip = document.createElement('span');
          chip.className = 'info-chip border-chip';
          chip.textContent = b.name;
          chip.addEventListener('click', () => {
            input.value = b.name;
            form.requestSubmit();
          });
          bordersRow.appendChild(chip);
        });
      }
    }
  }

  function renderMatchList(countries){
    matchItems.innerHTML = '';
    countries.slice(0, 10).forEach(c => {
      const item = document.createElement('div');
      item.className = 'match-item';
      const flagUrl = c.flags?.png || c.flags?.svg || '';
      item.innerHTML = `
        ${flagUrl ? `<img src="${flagUrl}" alt="">` : `<span>${escapeHtml(c.flag || '')}</span>`}
        <div>
          <div class="m-name">${escapeHtml(c.name?.common || '')}</div>
          <div class="m-region">${escapeHtml(c.region || '')}${c.capital ? ' · ' + escapeHtml(c.capital[0]) : ''}</div>
        </div>
      `;
      item.addEventListener('click', () => {
        matchList.classList.add('hidden');
        renderCountry(c);
      });
      matchItems.appendChild(item);
    });
    welcomePanel.classList.add('hidden');
    loadingPanel.classList.add('hidden');
    errorPanel.classList.add('hidden');
    entryEl.classList.add('hidden');
    matchList.classList.remove('hidden');
  }

  async function lookup(query){
    if (!countryList.length) await loadCountryData();
    showState('loading');
    searchBtn.disabled = true;
    const search = query.trim().toLowerCase();

    try{
      const results = countryList.filter(c => {
        const common = c.name?.common?.toLowerCase() || '';
        const official = c.name?.official?.toLowerCase() || '';
        const capitals = (c.capital || []).join(' ').toLowerCase();
        const alt = (c.altSpellings || []).join(' ').toLowerCase();
        return common.includes(search) || official.includes(search) || capitals.includes(search) || alt.includes(search);
      });

      if (!results.length){
        showState('error', query);
        return;
      }

      const exact = results.find(c =>
        c.name?.common?.toLowerCase() === search ||
        c.name?.official?.toLowerCase() === search ||
        (c.capital || []).some(cap => cap.toLowerCase() === search)
      );

      if (exact || results.length === 1){
        renderCountry(exact || results[0]);
      } else {
        renderMatchList(results);
      }
    } catch(err){
      console.error(err);
      showState('error', query);
    } finally {
      searchBtn.disabled = false;
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;
    lookup(query);
  });

  loadCountryData();
</script>
</body>
</html>
