<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expense Tracker — Track Your Spending Beautifully</title>
<meta name="description" content="A rich, modern expense tracker built with pure HTML, CSS, and JavaScript. Track income, expenses, categories, and balance." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0b0d17;
    --bg-1: #11142235;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #e7e9f4;
    --muted: #8b8fa7;
    --primary: #7c5cff;
    --primary-2: #00d4ff;
    --success: #2ee6a8;
    --danger: #ff5c8a;
    --warning: #ffb547;
    --gradient: linear-gradient(135deg, #7c5cff 0%, #00d4ff 100%);
    --gradient-success: linear-gradient(135deg, #2ee6a8, #00d4ff);
    --gradient-danger: linear-gradient(135deg, #ff5c8a, #ff8a5c);
    --shadow-lg: 0 20px 60px -20px rgba(124,92,255,.45);
    --shadow-card: 0 8px 32px -8px rgba(0,0,0,.4);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-0);
    background-image:
      radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,.25), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(0,212,255,.18), transparent 60%),
      radial-gradient(700px 500px at 50% 120%, rgba(46,230,168,.12), transparent 60%);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 20px;
  }
  .logo-mark {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--gradient);
    display: grid; place-items: center;
    box-shadow: var(--shadow-lg);
    font-size: 20px;
  }
  .top .meta { color: var(--muted); font-size: 14px; }

  /* Stat cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat {
    position: relative; overflow: hidden;
    padding: 22px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow-card);
  }
  .stat .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .08em; }
  .stat .value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px; font-weight: 700; margin-top: 8px;
  }
  .stat .delta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .stat .icon {
    position: absolute; top: 18px; right: 18px;
    width: 42px; height: 42px; border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
  }
  .stat.balance .icon { background: var(--gradient); }
  .stat.income .icon { background: var(--gradient-success); }
  .stat.expense .icon { background: var(--gradient-danger); }
  .stat.balance .value { background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stat.income .value { color: var(--success); }
  .stat.expense .value { color: var(--danger); }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow-card);
  }
  .card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px; font-weight: 600;
    margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card h2 .count {
    font-size: 12px; color: var(--muted); font-weight: 500;
    background: var(--surface-2); padding: 4px 10px; border-radius: 999px;
  }

  /* Form */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: rgba(0,0,0,.25);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit; font-size: 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(124,92,255,.18);
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 4px; background: rgba(0,0,0,.25); border-radius: 12px; margin-bottom: 14px; }
  .type-toggle button {
    padding: 10px; border-radius: 10px; border: none; cursor: pointer;
    background: transparent; color: var(--muted); font-weight: 600;
    font-family: inherit; font-size: 13px;
    transition: all .2s;
  }
  .type-toggle button.active.income { background: var(--gradient-success); color: #0b0d17; }
  .type-toggle button.active.expense { background: var(--gradient-danger); color: #fff; }

  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--gradient); border: none; border-radius: 12px;
    color: #fff; font-weight: 600; font-size: 14px;
    font-family: inherit; cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 24px 70px -20px rgba(124,92,255,.6); }
  .btn-primary:active { transform: translateY(0); }

  /* Filters */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all .2s;
  }
  .chip.active { background: var(--gradient); color: #fff; border-color: transparent; }

  /* Transactions */
  .tx-list { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
  .tx-list::-webkit-scrollbar { width: 6px; }
  .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .tx {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; border-radius: 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    transition: transform .15s, border-color .2s;
  }
  .tx:hover { transform: translateX(2px); border-color: rgba(124,92,255,.35); }
  .tx .cat-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(0,0,0,.35); display: grid; place-items: center;
    font-size: 22px; flex-shrink: 0;
  }
  .tx .info { flex: 1; min-width: 0; }
  .tx .title { font-weight: 600; font-size: 14px; }
  .tx .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .tx .amt { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; }
  .tx .amt.income { color: var(--success); }
  .tx .amt.expense { color: var(--danger); }
  .tx .del {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 8px;
    transition: all .2s; opacity: 0;
  }
  .tx:hover .del { opacity: 1; }
  .tx .del:hover { color: var(--danger); background: rgba(255,92,138,.1); }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }

  /* Category breakdown */
  .breakdown { margin-top: 24px; }
  .breakdown h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; color: var(--muted); margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .cat-row { margin-bottom: 12px; }
  .cat-row .head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .cat-row .head .name { display: flex; align-items: center; gap: 8px; }
  .bar { height: 6px; background: rgba(0,0,0,.3); border-radius: 999px; overflow: hidden; }
  .bar .fill { height: 100%; background: var(--gradient); border-radius: 999px; transition: width .5s ease; }

  @media (max-width: 860px) {
    .grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
    .stat .value { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo">
      <div class="logo-mark">💸</div>
      <div>
        <div>Pocket<span style="color:var(--primary-2)">Ledger</span></div>
        <div class="meta" id="todayDate"></div>
      </div>
    </div>
    <div class="meta">Local-first · Auto-saved</div>
  </header>

  <section class="stats">
    <div class="stat balance">
      <div class="icon">💎</div>
      <div class="label">Balance</div>
      <div class="value" id="balance">$0.00</div>
      <div class="delta" id="balanceDelta">Start adding transactions</div>
    </div>
    <div class="stat income">
      <div class="icon">↗</div>
      <div class="label">Income</div>
      <div class="value" id="income">$0.00</div>
      <div class="delta" id="incomeCount">0 entries</div>
    </div>
    <div class="stat expense">
      <div class="icon">↘</div>
      <div class="label">Expenses</div>
      <div class="value" id="expense">$0.00</div>
      <div class="delta" id="expenseCount">0 entries</div>
    </div>
  </section>

  <div class="grid">
    <!-- Form + breakdown -->
    <div class="card">
      <h2>Add Transaction</h2>

      <div class="type-toggle">
        <button type="button" class="active expense" data-type="expense" id="typeExpense">Expense</button>
        <button type="button" class="income" data-type="income" id="typeIncome">Income</button>
      </div>

      <form id="txForm">
        <div class="field">
          <label>Description</label>
          <input type="text" id="desc" placeholder="e.g. Coffee at Blue Bottle" required maxlength="60" />
        </div>
        <div class="row-2">
          <div class="field">
            <label>Amount</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
          </div>
          <div class="field">
            <label>Category</label>
            <select id="category"></select>
          </div>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="date" required />
        </div>
        <button type="submit" class="btn-primary">+ Add Transaction</button>
      </form>

      <div class="breakdown">
        <h3>Top Categories</h3>
        <div id="breakdown"></div>
      </div>
    </div>

    <!-- Transactions list -->
    <div class="card">
      <h2>Recent Activity <span class="count" id="txCount">0</span></h2>

      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="income">Income</button>
        <button class="chip" data-filter="expense">Expense</button>
        <button class="chip" data-filter="clear" style="margin-left:auto;background:transparent;border-color:var(--danger);color:var(--danger)">Clear All</button>
      </div>

      <div class="tx-list" id="txList"></div>
    </div>
  </div>
</div>

<script>
  const CATEGORIES = {
    expense: [
      { id: 'food', name: 'Food & Drink', icon: '🍔' },
      { id: 'transport', name: 'Transport', icon: '🚗' },
      { id: 'shopping', name: 'Shopping', icon: '🛍️' },
      { id: 'bills', name: 'Bills & Utilities', icon: '🧾' },
      { id: 'entertainment', name: 'Entertainment', icon: '🎬' },
      { id: 'health', name: 'Health', icon: '💊' },
      { id: 'travel', name: 'Travel', icon: '✈️' },
      { id: 'other_exp', name: 'Other', icon: '📦' },
    ],
    income: [
      { id: 'salary', name: 'Salary', icon: '💼' },
      { id: 'freelance', name: 'Freelance', icon: '💻' },
      { id: 'investment', name: 'Investment', icon: '📈' },
      { id: 'gift', name: 'Gift', icon: '🎁' },
      { id: 'other_inc', name: 'Other', icon: '💰' },
    ],
  };
  const ALL_CATS = [...CATEGORIES.expense, ...CATEGORIES.income];
  const catById = (id) => ALL_CATS.find(c => c.id === id) || { name: 'Other', icon: '📦' };

  const STORAGE_KEY = 'pocketledger.transactions.v1';
  let state = {
    type: 'expense',
    filter: 'all',
    transactions: load(),
  };

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.transactions)); }

  const fmt = (n) => new Intl.NumberFormat(undefined, { style: 'currency', currency: 'USD' }).format(n);

  // Init UI
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
  document.getElementById('date').valueAsDate = new Date();

  function renderCategoryOptions() {
    const sel = document.getElementById('category');
    sel.innerHTML = CATEGORIES[state.type].map(c => `<option value="${c.id}">${c.icon}  ${c.name}</option>`).join('');
  }
  renderCategoryOptions();

  // Type toggle
  document.querySelectorAll('.type-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.type = btn.dataset.type;
      document.querySelectorAll('.type-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCategoryOptions();
    });
  });

  // Filters
  document.querySelectorAll('#filters .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.dataset.filter === 'clear') {
        if (confirm('Delete all transactions? This cannot be undone.')) {
          state.transactions = [];
          save(); render();
        }
        return;
      }
      state.filter = chip.dataset.filter;
      document.querySelectorAll('#filters .chip').forEach(c => c.classList.toggle('active', c === chip));
      render();
    });
  });

  // Form submit
  document.getElementById('txForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const tx = {
      id: crypto.randomUUID(),
      type: state.type,
      desc: document.getElementById('desc').value.trim(),
      amount: parseFloat(document.getElementById('amount').value),
      category: document.getElementById('category').value,
      date: document.getElementById('date').value,
      createdAt: Date.now(),
    };
    if (!tx.desc || !(tx.amount > 0)) return;
    state.transactions.unshift(tx);
    save();
    e.target.reset();
    document.getElementById('date').valueAsDate = new Date();
    render();
  });

  function deleteTx(id) {
    state.transactions = state.transactions.filter(t => t.id !== id);
    save(); render();
  }

  function render() {
    const txs = state.transactions;
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('balance').textContent = fmt(balance);
    document.getElementById('income').textContent = fmt(income);
    document.getElementById('expense').textContent = fmt(expense);
    document.getElementById('incomeCount').textContent = `${txs.filter(t=>t.type==='income').length} entries`;
    document.getElementById('expenseCount').textContent = `${txs.filter(t=>t.type==='expense').length} entries`;
    document.getElementById('balanceDelta').textContent =
      balance >= 0 ? 'Looking good — you\'re in the green' : 'Spending exceeds income';

    // Filtered list
    const filtered = state.filter === 'all' ? txs : txs.filter(t => t.type === state.filter);
    document.getElementById('txCount').textContent = filtered.length;

    const list = document.getElementById('txList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="icon">🗂️</div><div>No transactions yet.<br/>Add your first one to get started.</div></div>`;
    } else {
      list.innerHTML = filtered
        .slice()
        .sort((a,b) => (b.date.localeCompare(a.date)) || (b.createdAt - a.createdAt))
        .map(t => {
          const c = catById(t.category);
          const d = new Date(t.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
          return `
            <div class="tx">
              <div class="cat-icon">${c.icon}</div>
              <div class="info">
                <div class="title">${escapeHtml(t.desc)}</div>
                <div class="sub">${c.name} · ${d}</div>
              </div>
              <div class="amt ${t.type}">${t.type === 'expense' ? '-' : '+'}${fmt(t.amount)}</div>
              <button class="del" title="Delete" onclick="deleteTx('${t.id}')">✕</button>
            </div>`;
        }).join('');
    }

    // Category breakdown (expenses only)
    const expByCat = {};
    txs.filter(t => t.type === 'expense').forEach(t => {
      expByCat[t.category] = (expByCat[t.category] || 0) + t.amount;
    });
    const totals = Object.entries(expByCat).sort((a,b) => b[1]-a[1]).slice(0,5);
    const max = totals[0]?.[1] || 1;
    const breakdown = document.getElementById('breakdown');
    if (totals.length === 0) {
      breakdown.innerHTML = `<div style="color:var(--muted);font-size:13px">No expenses tracked yet.</div>`;
    } else {
      breakdown.innerHTML = totals.map(([cat, val]) => {
        const c = catById(cat);
        const pct = (val/max)*100;
        return `
          <div class="cat-row">
            <div class="head">
              <div class="name">${c.icon} ${c.name}</div>
              <div style="color:var(--muted)">${fmt(val)}</div>
            </div>
            <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
          </div>`;
      }).join('');
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  window.deleteTx = deleteTx;
  render();
</script>
</body>
</html>
