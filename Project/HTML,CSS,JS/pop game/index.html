<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop it</title>
<style>
  :root {
    --bg: #e7e2d8;
    --sheet: #d8cdb8;
    --bubble: #f2ead9;
    --bubble-shadow: #c9bc9e;
    --popped: #cbbfa0;
    --ink: #3a3428;
    --accent: #7a6f52;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
    color: var(--ink);
    user-select: none;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 14px;
    color: var(--accent);
    margin: 0 0 20px;
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 22px;
    font-size: 14px;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    display: block;
  }
  .stat-label {
    color: var(--accent);
    font-size: 12px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }
  button.action {
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--bubble-shadow);
    background: var(--bubble);
    color: var(--ink);
    cursor: pointer;
  }
  button.action:hover { background: #fff; }
  .sheet {
    background: var(--sheet);
    border-radius: 16px;
    padding: 18px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    max-width: 480px;
    width: 100%;
  }
  @media (max-width: 480px) {
    .sheet { grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 14px; }
  }
  .bubble {
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #ffffff, var(--bubble) 55%, var(--bubble-shadow) 100%);
    box-shadow:
      inset -2px -3px 4px rgba(0,0,0,0.12),
      inset 2px 3px 4px rgba(255,255,255,0.6),
      0 1px 2px rgba(0,0,0,0.15);
    cursor: pointer;
    border: none;
    padding: 0;
    transition: transform 0.05s;
  }
  .bubble:active { transform: scale(0.9); }
  .bubble.popped {
    background: var(--popped);
    box-shadow: inset 1px 2px 3px rgba(0,0,0,0.25);
    cursor: default;
    animation: pop 0.18s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(1.15); }
    60% { transform: scale(0.85); }
    100% { transform: scale(1); }
  }
  .hint {
    margin-top: 18px;
    font-size: 12.5px;
    color: var(--accent);
    text-align: center;
    max-width: 340px;
  }
</style>
</head>
<body>

<h1>Pop it</h1>
<p class="sub">a sheet of bubble wrap, entirely for you</p>

<div class="stats">
  <div>
    <span class="stat-num" id="poppedCount">0</span>
    <span class="stat-label">popped</span>
  </div>
  <div>
    <span class="stat-num" id="totalCount">0</span>
    <span class="stat-label">lifetime pops</span>
  </div>
</div>

<div class="toolbar">
  <button class="action" id="freshBtn">Fresh sheet</button>
  <button class="action" id="resetTotalBtn">Reset lifetime count</button>
</div>

<div class="sheet" id="sheet"></div>

<p class="hint">Click or tap each bubble to pop it. Grab a fresh sheet any time — your lifetime total keeps counting.</p>

<script>
const ROWS = 6, COLS = 8;
let poppedThisSheet = 0;
let lifetimeTotal = parseInt(localStorage.getItem('popit-lifetime') || '0', 10) || 0;

const sheetEl = document.getElementById('sheet');
const poppedCountEl = document.getElementById('poppedCount');
const totalCountEl = document.getElementById('totalCount');

function updateStats() {
  poppedCountEl.textContent = poppedThisSheet;
  totalCountEl.textContent = lifetimeTotal;
}

function playPop() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220 + Math.random() * 60, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.1);
  } catch (e) {}
}

function buildSheet() {
  sheetEl.innerHTML = '';
  poppedThisSheet = 0;
  updateStats();
  const total = ROWS * COLS;
  for (let i = 0; i < total; i++) {
    const b = document.createElement('button');
    b.className = 'bubble';
    b.setAttribute('aria-label', 'Bubble');
    b.addEventListener('click', () => {
      if (b.classList.contains('popped')) return;
      b.classList.add('popped');
      poppedThisSheet++;
      lifetimeTotal++;
      localStorage.setItem('popit-lifetime', String(lifetimeTotal));
      updateStats();
      playPop();
    }, { once: true });
    sheetEl.appendChild(b);
  }
}

document.getElementById('freshBtn').addEventListener('click', buildSheet);
document.getElementById('resetTotalBtn').addEventListener('click', () => {
  lifetimeTotal = 0;
  localStorage.setItem('popit-lifetime', '0');
  updateStats();
});

buildSheet();
</script>

</body>
</html>
