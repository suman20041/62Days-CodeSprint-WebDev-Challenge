<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor game</title>
    <link rel="stylesheet" href="paper.css">
</head>
<body>
    <div class="nav">
    <h2>Let's Play</h2>
    <h1>Rock Paper Scissor</h1>
    </div>
    <div class="icons">
        <div class="emoji" id="rock">👊</div>
        <div class="emoji" id="paper">🖐️</div>
        <div class="emoji" id="scissor">✌️</div>
    </div>
    <div class="round">
        <div class="vs-you">
            <img src="r-p-s-images/user.png" class="youImg">
            <p>You</p>
            <div class="you-score">0</div>
            <P>SCORE</P>
        </div>
        <div class="vs-sign">
            <img src="r-p-s-images/vs.png">
            <div class="message">Start the game by choosing the icon</div>
                <div class="restart">
        <img src="r-p-s-images/restart.png" class="reimg">
    </div>

        </div>
        
        <div class="vs-com">
            <img src="r-p-s-images/computer.png" class="comImg">
            <p>Computer</p>
            <div class="com-score">0</div>
            <P>SCORE</P>
        </div>
    </div>
    <script src="scissor.js"></script>
</body>
</html>
